<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>精简版高级黑金报表海报生成器</title>
<style>
:root{
  --page:#070809;
  --panel:#111417;
  --panel2:#171a1e;
  --line:#30353b;
  --text:#f5f6f7;
  --muted:#9299a2;
  --gold:#d89b25;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:Arial,"Microsoft YaHei","PingFang SC",sans-serif;
  background:
    radial-gradient(circle at 18% 0%,rgba(217,155,37,.08),transparent 32%),
    linear-gradient(135deg,#050607,#0d1013 55%,#050607);
}
.app{
  width:min(1540px,100%);
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:430px minmax(0,1fr);
  gap:20px;
}
.editor,.preview-shell{
  background:rgba(14,16,18,.97);
  border:1px solid rgba(255,255,255,.075);
  border-radius:20px;
  box-shadow:0 25px 80px rgba(0,0,0,.48);
}
.editor{
  padding:18px;
  max-height:calc(100vh - 40px);
  overflow:auto;
}
.preview-shell{
  min-height:calc(100vh - 40px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  position:sticky;
  top:20px;
}
h1{font-size:22px;margin:0 0 6px}
.desc{
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
  margin-bottom:17px;
}
.section{
  padding:14px;
  margin-bottom:12px;
  border:1px solid #2b3035;
  border-radius:15px;
  background:linear-gradient(180deg,var(--panel2),var(--panel));
}
.section-title{
  color:#e9b954;
  font-size:13px;
  font-weight:900;
  letter-spacing:.06em;
  margin-bottom:11px;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{
  display:block;
  color:#b8bec5;
  font-size:12px;
  margin-bottom:5px;
}
input,button{
  width:100%;
  border:1px solid #383e45;
  border-radius:9px;
  background:#090b0d;
  color:#fff;
  padding:10px 11px;
  font-size:13px;
  outline:none;
}
input:focus{
  border-color:#ca8d26;
  box-shadow:0 0 0 3px rgba(202,141,38,.12);
}
input[type=file]{padding:8px;font-size:12px}
input[type=color]{height:42px;padding:4px}
.mini-head,.row-editor{
  display:grid;
  grid-template-columns:1.15fr 1fr 1fr 1fr 34px;
  gap:6px;
}
.mini-head{
  color:#848c95;
  font-size:10px;
  margin:0 2px 5px;
}
.row-editor{margin-bottom:7px}
.row-editor input{padding:8px 5px;font-size:11px}
.row-editor button{
  padding:0;
  background:#281216;
  border-color:#57262c;
  color:#ff989f;
  font-size:18px;
}
.add{
  margin-top:7px;
  background:#181c20;
  border-color:#4b3920;
  color:#edb655;
  font-weight:800;
}
.actions{
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:10px;
  position:sticky;
  bottom:-18px;
  padding:14px 0 2px;
  background:linear-gradient(180deg,transparent,#111417 30%);
}
button{cursor:pointer;font-weight:900}
.secondary{background:#191d21}
.primary{
  border:none;
  color:#140d04;
  background:linear-gradient(135deg,#ffd66e,#d89725 56%,#986117);
  box-shadow:0 14px 30px rgba(207,141,35,.22);
}
canvas{
  width:min(100%,720px);
  height:auto;
  aspect-ratio:3/4;
  border-radius:12px;
  background:#050607;
  box-shadow:0 28px 95px rgba(0,0,0,.68);
}
.note{
  color:#89919a;
  font-size:11px;
  line-height:1.55;
  margin-top:8px;
}
@media(max-width:980px){
  .app{grid-template-columns:1fr}
  .editor{max-height:none}
  .preview-shell{position:static;min-height:auto}
}
@media(max-width:560px){
  .app{padding:10px}
  .mini-head,.row-editor{grid-template-columns:1.05fr 1fr 1fr 1fr 28px}
  .row-editor input{font-size:10px;padding:7px 3px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="editor">
    <h1>每日报表海报</h1>
    <div class="desc">
      顶部区域已统一外边线：今日报表左边与下方格子对齐，扫码加入右边与下方格子右边对齐。
    </div>

    <div class="section">
      <div class="section-title">日期</div>
      <div class="grid2">
        <div>
          <label>星期</label>
          <input id="weekday">
        </div>
        <div>
          <label>日期</label>
          <input id="date">
        </div>
      </div>
      <div class="note">大总数会自动汇总表格内所有 Profit/Loss。</div>
    </div>

    <div class="section">
      <div class="section-title">完整报表</div>
      <div class="mini-head">
        <span>分类</span>
        <span>Valid Stake</span>
        <span>Payout</span>
        <span>Profit/Loss</span>
        <span></span>
      </div>
      <div id="rows"></div>
      <button class="add" id="addRow">＋ 添加分类</button>
    </div>

    <div class="actions">
      <button class="secondary" id="resetBtn">恢复示例</button>
      <button class="primary" id="downloadBtn">下载 3:4 PNG</button>
    </div>
  </aside>

  <main class="preview-shell">
    <canvas id="poster" width="1080" height="1440"></canvas>
  </main>
</div>

function esc(s){
  return String(s).replace(/[&<>"']/g,m=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
  }[m]));
}
function num(v){
  const n=Number(String(v).replace(/,/g,'').trim());
  return Number.isFinite(n)?n:0;
}
function money(n){
  return n.toLocaleString('en-US',{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}
function hexRgb(hex){
  const h=hex.replace('#','');
  const v=parseInt(h,16);
  return {r:(v>>16)&255,g:(v>>8)&255,b:v&255};
}
function rgba(hex,a){
  const c=hexRgb(hex);
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}
function hash(seed){
  const x=Math.sin(seed*12.9898+78.233)*43758.5453;
  return x-Math.floor(x);
}
function roundedRect(x,y,w,h,r){
  const rr=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.arcTo(x+w,y,x+w,y+h,rr);
  ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);
  ctx.arcTo(x,y,x+w,y,rr);
  ctx.closePath();
}
function chamferPath(x,y,w,h,c=18){
  ctx.beginPath();
  ctx.moveTo(x+c,y);
  ctx.lineTo(x+w-c,y);
  ctx.lineTo(x+w,y+c);
  ctx.lineTo(x+w,y+h-c);
  ctx.lineTo(x+w-c,y+h);
  ctx.lineTo(x+c,y+h);
  ctx.lineTo(x,y+h-c);
  ctx.lineTo(x,y+c);
  ctx.closePath();
}
function fit(value,maxWidth,start,min=14,font='Arial'){
  let size=start;
  while(size>min){
    ctx.font=`900 ${size}px ${font}`;
    if(ctx.measureText(value).width<=maxWidth)break;
    size-=2;
  }
  return size;
}
function txt(value,x,y,size,color,align='left',weight='900',font='Arial, "Microsoft YaHei", sans-serif'){
  ctx.save();
  ctx.font=`${weight} ${size}px ${font}`;
  ctx.fillStyle=color;
  ctx.textAlign=align;
  ctx.textBaseline='middle';
  ctx.fillText(value,x,y);
  ctx.restore();
}
function drawContain(img,x,y,w,h){
  const s=Math.min(w/img.width,h/img.height);
  const dw=img.width*s,dh=img.height*s;
  ctx.drawImage(img,x+(w-dw)/2,y+(h-dh)/2,dw,dh);
}
function drawCover(img,x,y,w,h){
  const s=Math.max(w/img.width,h/img.height);
  const sw=w/s,sh=h/s;
  const sx=(img.width-sw)/2,sy=(img.height-sh)/2;
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
}

function drawQrPlaceholder(cx,top,size=152){
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;
  const outer=size+26;
  const x=cx-outer/2;
  const y=top;

  ctx.save();

  // Natural shadow follows the compact QR frame.
  ctx.shadowColor='rgba(0,0,0,.72)';
  ctx.shadowBlur=18;
  ctx.shadowOffsetY=9;
  chamferPath(x,y,outer,outer,12);
  ctx.fillStyle='rgba(3,4,5,.94)';
  ctx.fill();
  ctx.restore();

  // Deep bronze outer edge.
  chamferPath(x,y,outer,outer,12);
  ctx.strokeStyle='#603607';
  ctx.lineWidth=8;
  ctx.stroke();

  // Bright metallic inner edge.
  chamferPath(x+4,y+4,outer-8,outer-8,9);
  ctx.strokeStyle=goldGradient(x,y,outer,outer);
  ctx.lineWidth=3;
  ctx.stroke();

  chamferPath(x+11,y+11,outer-22,outer-22,6);
  ctx.strokeStyle=rgba(light,.34);
  ctx.lineWidth=1.2;
  ctx.stroke();

  // Blank white QR area.
  const whiteSize=size-8;
  const wx=cx-whiteSize/2;
  const wy=y+(outer-whiteSize)/2;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(wx,wy,whiteSize,whiteSize);

  // Four refined corner accents.
  const c=17;
  ctx.strokeStyle=goldGradient(wx,wy,whiteSize,whiteSize);
  ctx.lineWidth=4;
  ctx.lineCap='square';

  [
    [wx+4,wy+4,1,1],
    [wx+whiteSize-4,wy+4,-1,1],
    [wx+4,wy+whiteSize-4,1,-1],
    [wx+whiteSize-4,wy+whiteSize-4,-1,-1]
  ].forEach(([ax,ay,sx,sy])=>{
    ctx.beginPath();
    ctx.moveTo(ax+sx*c,ay);
    ctx.lineTo(ax,ay);
    ctx.lineTo(ax,ay+sy*c);
    ctx.stroke();
  });

  ctx.restore();
}

function drawFancyVerticalLabel(text,boxX,boxY,boxW,boxH){
  const chars=[...text];
  const cx=boxX+boxW/2;
  const topPad=48;
  const bottomPad=48;
  const usableH=boxH-topPad-bottomPad;
  const step=usableH/(chars.length-1);

  // 与 QR 外框同高、同一水平线的独立金边框。
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.66)';
  ctx.shadowBlur=16;
  ctx.shadowOffsetY=8;
  chamferPath(boxX,boxY,boxW,boxH,12);
  ctx.fillStyle='rgba(3,4,5,.96)';
  ctx.fill();
  ctx.restore();

  // 深金外边。
  chamferPath(boxX,boxY,boxW,boxH,12);
  ctx.strokeStyle='#603607';
  ctx.lineWidth=8;
  ctx.stroke();

  // 明亮金属中边。
  chamferPath(boxX+4,boxY+4,boxW-8,boxH-8,9);
  ctx.strokeStyle=goldGradient(boxX,boxY,boxW,boxH);
  ctx.lineWidth=3;
  ctx.stroke();

  // 内侧细金线，与 QR 框保持一致。
  chamferPath(boxX+11,boxY+11,boxW-22,boxH-22,6);
  ctx.strokeStyle=rgba(FIXED_LIGHT_GOLD,.34);
  ctx.lineWidth=1.2;
  ctx.stroke();

  ctx.save();
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.lineJoin='round';
  ctx.miterLimit=3;

  chars.forEach((char,index)=>{
    const y=boxY+topPad+index*step;
    const size=50;
    ctx.font=`900 ${size}px "Microsoft YaHei","PingFang SC",Arial,sans-serif`;

    // 克制柔光，不让文字边缘发虚。
    ctx.save();
    ctx.shadowColor='rgba(255,215,120,.18)';
    ctx.shadowBlur=9;
    ctx.fillStyle='rgba(255,244,213,.18)';
    ctx.fillText(char,cx,y);
    ctx.restore();

    // 紧凑立体厚度。
    for(let d=4;d>=1;d--){
      ctx.lineWidth=8;
      ctx.strokeStyle='rgba(0,0,0,.88)';
      ctx.fillStyle=d>2?'#17120b':'#6b400b';
      ctx.strokeText(char,cx+d*.28,y+d*.32);
      ctx.fillText(char,cx+d*.28,y+d*.32);
    }

    // 高对比黑边、深金中层、亮金细边。
    ctx.lineWidth=10;
    ctx.strokeStyle='#030303';
    ctx.strokeText(char,cx,y);

    ctx.lineWidth=4;
    ctx.strokeStyle='#9b5a0b';
    ctx.strokeText(char,cx,y);

    ctx.lineWidth=1.8;
    ctx.strokeStyle='#ffe7a2';
    ctx.strokeText(char,cx,y);

    const g=ctx.createLinearGradient(cx,y-size*.52,cx,y+size*.52);
    g.addColorStop(0,'#ffffff');
    g.addColorStop(.58,'#fffaf0');
    g.addColorStop(1,'#e9c66f');
    ctx.fillStyle=g;
    ctx.fillText(char,cx,y);
  });

  ctx.restore();
}

function goldGradient(x,y,w,h){
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;
  const g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,'#70430d');
  g.addColorStop(.18,gold);
  g.addColorStop(.42,light);
  g.addColorStop(.57,'#fff0a2');
  g.addColorStop(.73,gold);
  g.addColorStop(1,'#633908');
  return g;
}

function diamondPath(w,h,scale=1){
  const hw=w*.5*scale;
  const hh=h*.5*scale;
  ctx.beginPath();
  ctx.moveTo(0,-hh);
  ctx.lineTo(hw,0);
  ctx.lineTo(0,hh);
  ctx.lineTo(-hw,0);
  ctx.closePath();
}

function drawLuxuryDiamond(cx,cy,w,h,rotation=0,showGlint=true){
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rotation);

  // Soft reflected glow behind the ornament.
  const halo=ctx.createRadialGradient(0,0,0,0,0,Math.max(w,h)*1.25);
  halo.addColorStop(0,rgba(light,.24));
  halo.addColorStop(.38,rgba(gold,.08));
  halo.addColorStop(1,rgba(gold,0));
  ctx.fillStyle=halo;
  ctx.fillRect(-w*1.4,-h*1.4,w*2.8,h*2.8);

  // Deep black extrusion so the ornament feels embedded, not pasted on.
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.95)';
  ctx.shadowBlur=13;
  ctx.shadowOffsetX=4;
  ctx.shadowOffsetY=7;
  diamondPath(w+18,h+18,1);
  ctx.fillStyle='#020303';
  ctx.fill();
  ctx.restore();

  // Outer bronze bevel.
  diamondPath(w+10,h+10,1);
  const outer=ctx.createLinearGradient(-w*.6,-h*.6,w*.6,h*.6);
  outer.addColorStop(0,'#4d2a05');
  outer.addColorStop(.20,'#d89419');
  outer.addColorStop(.38,'#fff0a0');
  outer.addColorStop(.56,'#a9640c');
  outer.addColorStop(.78,'#efb53a');
  outer.addColorStop(1,'#3d2104');
  ctx.fillStyle=outer;
  ctx.fill();

  // Thin black separator between frame and gem.
  diamondPath(w,h,.90);
  ctx.fillStyle='#070707';
  ctx.fill();

  // Main gem body.
  diamondPath(w,h,.76);
  const body=ctx.createLinearGradient(-w*.35,-h*.45,w*.35,h*.45);
  body.addColorStop(0,'#fff6c8');
  body.addColorStop(.22,light);
  body.addColorStop(.48,'#d49320');
  body.addColorStop(.70,'#85500c');
  body.addColorStop(1,'#f1b43a');
  ctx.fillStyle=body;
  ctx.fill();

  // Faceted planes: every plane has a different reflection.
  ctx.beginPath();
  ctx.moveTo(0,-h*.38);
  ctx.lineTo(0,0);
  ctx.lineTo(-w*.38,0);
  ctx.closePath();
  let facet=ctx.createLinearGradient(-w*.3,-h*.3,0,0);
  facet.addColorStop(0,'rgba(255,255,255,.78)');
  facet.addColorStop(1,'rgba(255,210,90,.08)');
  ctx.fillStyle=facet;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0,-h*.38);
  ctx.lineTo(w*.38,0);
  ctx.lineTo(0,0);
  ctx.closePath();
  facet=ctx.createLinearGradient(0,-h*.35,w*.35,0);
  facet.addColorStop(0,'rgba(255,229,145,.72)');
  facet.addColorStop(1,'rgba(126,69,5,.22)');
  ctx.fillStyle=facet;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(-w*.38,0);
  ctx.lineTo(0,0);
  ctx.lineTo(0,h*.38);
  ctx.closePath();
  facet=ctx.createLinearGradient(-w*.3,0,0,h*.34);
  facet.addColorStop(0,'rgba(190,112,12,.32)');
  facet.addColorStop(1,'rgba(87,44,3,.72)');
  ctx.fillStyle=facet;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(w*.38,0);
  ctx.lineTo(0,h*.38);
  ctx.closePath();
  facet=ctx.createLinearGradient(w*.3,0,0,h*.34);
  facet.addColorStop(0,'rgba(255,193,51,.34)');
  facet.addColorStop(1,'rgba(115,61,5,.62)');
  ctx.fillStyle=facet;
  ctx.fill();

  // Crisp double-edge highlight.
  diamondPath(w,h,.77);
  ctx.strokeStyle='rgba(255,249,211,.76)';
  ctx.lineWidth=1.25;
  ctx.stroke();

  diamondPath(w,h,.92);
  ctx.strokeStyle=rgba(gold,.82);
  ctx.lineWidth=1.4;
  ctx.stroke();

  // Small dark central facet gives depth.
  diamondPath(w,h,.20);
  const core=ctx.createLinearGradient(0,-h*.1,0,h*.1);
  core.addColorStop(0,'rgba(255,231,151,.55)');
  core.addColorStop(.5,'rgba(86,43,3,.88)');
  core.addColorStop(1,'rgba(235,160,31,.58)');
  ctx.fillStyle=core;
  ctx.fill();

  if(showGlint){
    // Controlled jewelry-like glint, not a flat blur.
    const gx=-w*.19,gy=-h*.22;
    const sparkle=ctx.createRadialGradient(gx,gy,0,gx,gy,Math.max(w,h)*.26);
    sparkle.addColorStop(0,'rgba(255,255,255,.88)');
    sparkle.addColorStop(.10,'rgba(255,249,218,.72)');
    sparkle.addColorStop(.28,'rgba(255,226,133,.38)');
    sparkle.addColorStop(.58,'rgba(255,199,55,.10)');
    sparkle.addColorStop(1,'rgba(255,199,55,0)');
    ctx.fillStyle=sparkle;
    ctx.beginPath();
    ctx.arc(gx,gy,Math.max(w,h)*.26,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle='rgba(255,255,235,.88)';
    ctx.lineCap='round';
    ctx.lineWidth=1.15;
    ctx.beginPath();
    ctx.moveTo(gx-w*.19,gy);
    ctx.lineTo(gx+w*.19,gy);
    ctx.moveTo(gx,gy-h*.19);
    ctx.lineTo(gx,gy+h*.19);
    ctx.stroke();
  }

  ctx.restore();
}

function drawLuxurySeparator(x1,y1,x2,y2,diamondX,diamondY,diamondW,diamondH,rotation=0){
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;

  ctx.save();
  ctx.lineCap='round';

  // Black recess behind the line.
  ctx.strokeStyle='rgba(0,0,0,.82)';
  ctx.lineWidth=7;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  // Bronze outer line.
  ctx.strokeStyle='#75450b';
  ctx.lineWidth=3.5;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  // Fine luminous metal highlight.
  const lg=ctx.createLinearGradient(x1,y1,x2,y2);
  lg.addColorStop(0,rgba(gold,.24));
  lg.addColorStop(.35,rgba(light,.92));
  lg.addColorStop(.52,'rgba(255,249,212,.96)');
  lg.addColorStop(.68,rgba(light,.82));
  lg.addColorStop(1,rgba(gold,.18));
  ctx.strokeStyle=lg;
  ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  ctx.restore();
  drawLuxuryDiamond(diamondX,diamondY,diamondW,diamondH,rotation,true);
}

function getNoise(){
  if(noiseCanvas)return noiseCanvas;
  noiseCanvas=document.createElement('canvas');
  noiseCanvas.width=360;
  noiseCanvas.height=480;
  const nctx=noiseCanvas.getContext('2d');
  const image=nctx.createImageData(noiseCanvas.width,noiseCanvas.height);
  for(let y=0;y<noiseCanvas.height;y++){
    for(let x=0;x<noiseCanvas.width;x++){
      const i=(y*noiseCanvas.width+x)*4;
      const fine=hash(x*1.7+y*4.9);
      const streak=hash(Math.floor((x+y*.28)/4)*7.7);
      const value=Math.floor(68+fine*48+streak*18);
      image.data[i]=value;
      image.data[i+1]=value;
      image.data[i+2]=value+2;
      image.data[i+3]=29;
    }
  }
  nctx.putImageData(image,0,0);
  return noiseCanvas;
}

function drawMarbleCrack(points,alpha=.17,width=1.3){
  ctx.save();
  ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
  ctx.lineWidth=width;
  ctx.beginPath();
  ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);
  ctx.stroke();
  ctx.strokeStyle=rgba(FIXED_GOLD,alpha*.72);
  ctx.lineWidth=Math.max(.55,width*.45);
  ctx.stroke();
  ctx.restore();
}

function drawGoldBeam(x1,y1,x2,y2,width){
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;

  ctx.save();
  ctx.lineCap='square';

  ctx.shadowColor='rgba(0,0,0,.85)';
  ctx.shadowBlur=16;
  ctx.strokeStyle='rgba(0,0,0,.78)';
  ctx.lineWidth=width+15;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();

  ctx.shadowColor=rgba(light,.52);
  ctx.shadowBlur=22;
  ctx.strokeStyle='#5f3508';
  ctx.lineWidth=width+5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();

  const beam=ctx.createLinearGradient(x1,y1,x2,y2);
  beam.addColorStop(0,'#6c3d08');

  beam.addColorStop(.54,light);

  beam.addColorStop(.76,gold);

  ctx.strokeStyle=beam;
  ctx.lineWidth=width;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();

  ctx.shadowColor='transparent';
  ctx.strokeStyle='rgba(255,244,194,.62)';
  ctx.lineWidth=Math.max(1.1,width*.12);
  ctx.beginPath();ctx.moveTo(x1,y1-width*.08);ctx.lineTo(x2,y2-width*.08);ctx.stroke();
  ctx.restore();
}

function drawGoldDust(cx,cy,w,h,count){
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;
  ctx.save();
  ctx.globalCompositeOperation='screen';

  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)*.45);
  glow.addColorStop(0,rgba(light,.13));
  glow.addColorStop(.35,rgba(gold,.055));
  glow.addColorStop(1,rgba(gold,0));
  ctx.fillStyle=glow;
  ctx.fillRect(cx-w/2,cy-h/2,w,h);

  for(let i=0;i<count;i++){
    const px=cx+(hash(i*7.31)-.5)*w;
    const py=cy+(hash(i*11.47)-.5)*h;
    const r=.7+hash(i*13.17)*3.4;
    const a=.035+hash(i*17.9)*.25;
    ctx.fillStyle=i%5===0?rgba(light,a):rgba(gold,a);
    ctx.beginPath();
    ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function draw3DText(value,x,y,size,maxWidth,align='left'){
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;
  const font='"Microsoft YaHei","PingFang SC",Arial,sans-serif';

  const finalSize=fit(value,maxWidth,size,20,font);
  ctx.save();
  ctx.font=`900 ${finalSize}px ${font}`;
  ctx.textAlign=align;
  ctx.textBaseline='middle';
  ctx.lineJoin='round';
  ctx.miterLimit=3;

  // 紧凑的硬质厚度，不使用大面积模糊阴影。
  for(let d=11;d>=2;d-=1.5){
    ctx.lineWidth=10;
    ctx.strokeStyle=d>7?'rgba(9,5,1,.94)':'rgba(75,42,5,.90)';
    ctx.fillStyle=d>7?'#231404':'#68400b';
    ctx.strokeText(value,x+d*.34,y+d*.38);
    ctx.fillText(value,x+d*.34,y+d*.38);
  }

  // 高对比度外轮廓。
  ctx.lineWidth=16;
  ctx.strokeStyle='#020202';
  ctx.strokeText(value,x,y);

  // 深铜中层，分开黑边和金字。
  ctx.lineWidth=8;
  ctx.strokeStyle='#5d3307';
  ctx.strokeText(value,x,y);

  // 明亮细金边，令轮廓清晰锐利。
  ctx.lineWidth=3.2;
  ctx.strokeStyle='#ffd978';
  ctx.strokeText(value,x,y);

  const g=ctx.createLinearGradient(x,y-finalSize*.62,x,y+finalSize*.62);
  g.addColorStop(0,'#fff6c9');
  g.addColorStop(.12,'#ffe18a');
  g.addColorStop(.32,light);
  g.addColorStop(.55,'#d89320');
  g.addColorStop(.76,'#8e4d08');
  g.addColorStop(.91,'#d9921c');
  g.addColorStop(1,'#f7c95d');
  ctx.fillStyle=g;
  ctx.fillText(value,x,y);

  // 只保留一条非常克制的顶部高光，避免整体发虚。
  ctx.globalAlpha=.18;
  ctx.fillStyle='#fffdf0';
  ctx.fillText(value,x,y-2);
  ctx.restore();
}

  const headerH=60,totalH=70;
  const bottomLimit=1215;
  const bodySpace=bottomLimit-y-headerH-totalH;
  const rowH=Math.max(38,Math.min(78,bodySpace/rows.length));
  const totalHeight=headerH+rowH*rows.length+totalH;
  const cols=[0,225,470,715,w];
  const headers=['CATEGORY','VALID STAKE','PAYOUT','PROFIT / LOSS'];
  const gold=FIXED_GOLD;
  const light=FIXED_LIGHT_GOLD;

  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.72)';
  ctx.shadowBlur=26;
  ctx.shadowOffsetY=16;
  chamferPath(x,y,w,totalHeight,11);
  ctx.fillStyle='rgba(4,5,6,.93)';
  ctx.fill();
  ctx.restore();

  // 表头。
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x+11,y);
  ctx.lineTo(x+w-11,y);
  ctx.lineTo(x+w,y+11);
  ctx.lineTo(x+w,y+headerH);
  ctx.lineTo(x,y+headerH);
  ctx.lineTo(x,y+11);
  ctx.closePath();
  ctx.fillStyle=goldGradient(x,y,w,headerH);
  ctx.fill();
  ctx.restore();

  headers.forEach((h,i)=>{
    const size=fit(h,cols[i+1]-cols[i]-20,20,14,'Arial');
    txt(h,x+(cols[i]+cols[i+1])/2,y+headerH/2,size,'#15100a','center','900','Arial');
  });

  rows.forEach((r,i)=>{
    const ry=y+headerH+i*rowH;

    // Clean white report cells with very subtle warm alternation.
    const bg=ctx.createLinearGradient(x,ry,x+w,ry);
    if(i%2===0){
      bg.addColorStop(0,'#ffffff');
      bg.addColorStop(.55,'#fbfaf7');
      bg.addColorStop(1,'#f4f1e9');
    }else{
      bg.addColorStop(0,'#f7f5ef');
      bg.addColorStop(.55,'#ffffff');
      bg.addColorStop(1,'#eeeae0');
    }
    ctx.fillStyle=bg;
    ctx.fillRect(x,ry,w,rowH);

    const values=[
      r.name,
      money(num(r.stake)),
      money(num(r.payout)),
      money(num(r.profit))
    ];
    values.forEach((v,j)=>{
      const size=fit(v,cols[j+1]-cols[j]-22,j===0?25:23,13,'Arial');
      txt(
        v,
        x+(cols[j]+cols[j+1])/2,
        ry+rowH/2,
        size,
        '#111111',
        'center',
        j===0?'900':'800',
        'Arial'
      );
    });
  });

  const ty=y+headerH+rows.length*rowH;
  const tg=ctx.createLinearGradient(x,ty,x+w,ty);
  tg.addColorStop(0,'#fffdf7');
  tg.addColorStop(.48,'#f4ead2');
  tg.addColorStop(1,'#fffdf7');
  ctx.fillStyle=tg;
  ctx.fillRect(x,ty,w,totalH);
  ctx.fillStyle=goldGradient(x,ty,w,0);
  ctx.fillRect(x,ty,w,4);

  const totals=[
    'GRAND TOTAL',
    money(rows.reduce((s,r)=>s+num(r.stake),0)),
    money(rows.reduce((s,r)=>s+num(r.payout),0)),
    money(rows.reduce((s,r)=>s+num(r.profit),0))
  ];
  totals.forEach((v,j)=>{
    const size=fit(v,cols[j+1]-cols[j]-20,j===0?24:22,13,'Arial');
    txt(v,x+(cols[j]+cols[j+1])/2,ty+totalH/2+2,size,'#111111','center','900','Arial');
  });

  // 连续对称表格线。
  ctx.save();
  ctx.strokeStyle='rgba(55,42,22,.55)';
  ctx.lineWidth=1.35;
  chamferPath(x,y,w,totalHeight,11);
  ctx.stroke();

  [cols[1],cols[2],cols[3]].forEach(v=>{
    ctx.beginPath();
    ctx.moveTo(x+v,y);
    ctx.lineTo(x+v,y+totalHeight);
    ctx.stroke();
  });

  ctx.beginPath();
  ctx.moveTo(x,y+headerH);
  ctx.lineTo(x+w,y+headerH);
  ctx.stroke();

  for(let i=1;i<=rows.length;i++){
    const ly=y+headerH+i*rowH;
    ctx.beginPath();
    ctx.moveTo(x,ly);
    ctx.lineTo(x+w,ly);
    ctx.stroke();
  }
  ctx.restore();
}

function drawSlogan(){
  const slogan=FIXED_SLOGAN;
  const size=fit(slogan,1030,94,44,'"Microsoft YaHei","PingFang SC",Arial,sans-serif');
  const y=1325;

  ctx.save();
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.font=`900 ${size}px "Microsoft YaHei","PingFang SC",Arial,sans-serif`;
  ctx.lineJoin='round';

  // 柔和扩散阴影：边缘逐渐消失，不再形成生硬黑块。
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.58)';
  ctx.shadowBlur=24;
  ctx.shadowOffsetX=2;
  ctx.shadowOffsetY=13;
  ctx.fillStyle='rgba(0,0,0,.30)';
  ctx.fillText(slogan,540,y+2);
  ctx.restore();

  // 渐进式立体厚度：层数更密、透明度更低，过渡更自然。
  ctx.shadowColor='transparent';
  for(let d=14;d>=1;d-=1){
    const progress=d/14;
    ctx.lineWidth=10+progress*3;
    ctx.strokeStyle=`rgba(14,8,2,${.16+progress*.38})`;
    ctx.fillStyle=progress>.55
      ? `rgba(44,27,6,${.42+progress*.28})`
      : `rgba(112,67,11,${.42+progress*.22})`;
    ctx.strokeText(slogan,540+d*.32,y+d*.38);
    ctx.fillText(slogan,540+d*.32,y+d*.38);
  }
  ctx.lineWidth=18;
  ctx.strokeStyle='#020202';
  ctx.strokeText(slogan,540,y);

  ctx.lineWidth=8;
  ctx.strokeStyle='#603507';
  ctx.strokeText(slogan,540,y);

  ctx.lineWidth=3;
  ctx.strokeStyle='#ffd978';
  ctx.strokeText(slogan,540,y);

  const sg=ctx.createLinearGradient(540,y-size*.65,540,y+size*.65);
  sg.addColorStop(0,'#fff1ad');
  sg.addColorStop(.17,FIXED_LIGHT_GOLD);
  sg.addColorStop(.42,'#e7aa2e');
  sg.addColorStop(.64,FIXED_GOLD);
  sg.addColorStop(.84,'#8d500c');
  sg.addColorStop(1,'#efb63c');
  ctx.fillStyle=sg;
  ctx.fillText(slogan,540,y);

  ctx.globalAlpha=.26;
  ctx.fillStyle='#fff9d7';
  ctx.fillText(slogan,540,y-4);
  ctx.restore();

  // 底部装饰线。
  ctx.save();
  const line=ctx.createLinearGradient(85,0,995,0);
  line.addColorStop(0,rgba(FIXED_GOLD,0));
  line.addColorStop(.38,rgba(FIXED_GOLD,.55));
  line.addColorStop(.5,rgba(FIXED_LIGHT_GOLD,.92));
  line.addColorStop(.62,rgba(FIXED_GOLD,.55));
  line.addColorStop(1,rgba(FIXED_GOLD,0));
  ctx.fillStyle=line;
  ctx.fillRect(85,1410,910,2);

  ctx.restore();

  // 底部中央使用多层金属徽记，并增加两侧细小切角。
  drawLuxuryDiamond(540,1410,42,52,0,true);

  ctx.save();
  ctx.strokeStyle=rgba(FIXED_GOLD,.62);
  ctx.lineWidth=1.4;
  ctx.beginPath();
  ctx.moveTo(490,1410);
  ctx.lineTo(509,1398);
  ctx.lineTo(523,1410);
  ctx.lineTo(509,1422);
  ctx.moveTo(590,1410);
  ctx.lineTo(571,1398);
  ctx.lineTo(557,1410);
  ctx.lineTo(571,1422);
  ctx.stroke();
  ctx.restore();
}

function draw(){
  try{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBackground();
    drawHeader();
    drawTotalPanel();
    drawTable();
    drawSlogan();
  }catch(error){
    console.error(error);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#070809';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    txt('预览载入失败，请重新打开页面',540,720,34,'#ffd66e','center','900');
  }
}

$('downloadBtn').onclick=()=>{
  draw();
  const a=document.createElement('a');
  const safe=($('date').value||'report').replace(/[^\d.-]/g,'-');
  a.download=`Premium-Black-Gold-Report-${safe}.png`;
  a.href=canvas.toDataURL('image/png');
  a.click();
};

$('resetBtn').onclick=()=>{
  rows=JSON.parse(JSON.stringify(sampleRows));
  setToday();
  renderRows();
  draw();
};

draw();
</script>
